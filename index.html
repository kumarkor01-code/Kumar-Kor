<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माझा पहिला गेम</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            margin-top: 20%;
        }
        h1 { font-size: 40px; }
        #score { font-size: 60px; color: #f1c40f; font-weight: bold; }
        button {
            font-size: 24px;
            padding: 15px 30px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px #c0392b;
        }
        button:active {
            box-shadow: 0 2px #c0392b;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <h1>💰 Coin Clicker 💰</h1>
    <p>पॉईंट्स मिळवण्यासाठी खालील बटनावर क्लिक करा!</p>
    <div id="score">0</div>
    <br><br>
    <button onclick="increaseScore()">इथे क्लिक करा 👆</button>

    <script>
        let score = 0;
        function increaseScore() {
            score++;
            document.getElementById("score").innerText = score;
        }
    </script>

</body>
</html>
